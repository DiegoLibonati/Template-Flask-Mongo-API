services:

  boilerplate-server:
    build:
      context: .
      dockerfile: Dockerfile.development
    restart: always
    env_file:
      - ./.env
    volumes:
      - ".:/home/app"
    depends_on:
      boilerplate-db:
        condition: service_healthy
    ports:
      - "5050:5050"
    networks:
      - boilerplate-net

  boilerplate-db:
    image: mongo:7.0
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret123
      MONGO_INITDB_DATABASE: boilerplate_db
    volumes:
      - db-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - boilerplate-net

  mongo-express:
    image: mongo-express:1
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:secret123@boilerplate-db:27017/boilerplate_db?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      boilerplate-db:
        condition: service_healthy
    networks:
      - boilerplate-net

volumes:
  db-data:
    driver: local

networks:
  boilerplate-net:
    driver: bridge
